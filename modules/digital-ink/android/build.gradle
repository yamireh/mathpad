plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.digitalink'
version = '0.1.0'

android {
  namespace "expo.modules.digitalink"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // On-device handwriting recognition. The model is downloaded at runtime via
  // RemoteModelManager (mirrors the iOS MLKitDigitalInkRecognition pod).
  // 19.0.0 is the first release with 16 KB page-size-aligned native libs
  // (Android 15 / Google Play requirement) — 18.1.0's libdigitalink.so is 4 KB.
  implementation 'com.google.mlkit:digital-ink-recognition:19.0.0'
}
